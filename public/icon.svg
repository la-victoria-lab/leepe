<svg width="192" height="192" viewBox="0 0 192 192" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="192" height="192" rx="44" fill="#7C5CFF"/>
  
  <!-- Book shape with gradient effect -->
  <g transform="translate(96, 96)">
    <!-- Left page -->
    <path d="M -45 -50 L -5 -50 L -5 50 L -45 50 C -52 50 -58 44 -58 37 L -58 -37 C -58 -44 -52 -50 -45 -50" 
          fill="#E8D4B8" stroke="#D4B896" stroke-width="2"/>
    
    <!-- Right page -->
    <path d="M 5 -50 L 45 -50 C 52 -50 58 -44 58 -37 L 58 37 C 58 44 52 50 45 50 L 5 50 L 5 -50" 
          fill="#F5E6D3" stroke="#D4B896" stroke-width="2"/>
    
    <!-- Center spine -->
    <line x1="0" y1="-50" x2="0" y2="50" stroke="#D4B896" stroke-width="2"/>
    
    <!-- Page lines on left -->
    <line x1="-40" y1="-40" x2="-10" y2="-40" stroke="#D4B896" stroke-width="1.5" opacity="0.6"/>
    <line x1="-40" y1="-30" x2="-10" y2="-30" stroke="#D4B896" stroke-width="1.5" opacity="0.6"/>
    <line x1="-40" y1="-20" x2="-10" y2="-20" stroke="#D4B896" stroke-width="1.5" opacity="0.6"/>
    
    <!-- Page lines on right -->
    <line x1="10" y1="-40" x2="40" y2="-40" stroke="#D4B896" stroke-width="1.5" opacity="0.6"/>
    <line x1="10" y1="-30" x2="40" y2="-30" stroke="#D4B896" stroke-width="1.5" opacity="0.6"/>
    <line x1="10" y1="-20" x2="40" y2="-20" stroke="#D4B896" stroke-width="1.5" opacity="0.6"/>
    
    <!-- V shape - bold and centered -->
    <g transform="translate(0, -8)">
      <!-- Left diagonal of V -->
      <line x1="-18" y1="-22" x2="-2" y2="20" stroke="#2D1810" stroke-width="6" stroke-linecap="round"/>
      <!-- Right diagonal of V -->
      <line x1="18" y1="-22" x2="2" y2="20" stroke="#2D1810" stroke-width="6" stroke-linecap="round"/>
    </g>
  </g>
</svg>
