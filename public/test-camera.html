<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Test Cámara - LEE(PE)</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        padding: 20px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
      }

      .container {
        max-width: 800px;
        margin: 0 auto;
        background: white;
        border-radius: 20px;
        padding: 30px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      }

      h1 {
        color: #333;
        margin-bottom: 10px;
      }

      .subtitle {
        color: #666;
        margin-bottom: 30px;
        font-size: 14px;
      }

      button {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        padding: 15px 30px;
        border-radius: 10px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        margin-bottom: 20px;
        transition: transform 0.2s;
      }

      button:hover {
        transform: scale(1.05);
      }

      button:active {
        transform: scale(0.95);
      }

      #status {
        padding: 15px;
        border-radius: 10px;
        margin-bottom: 20px;
        font-weight: 500;
      }

      #status.info {
        background: #e3f2fd;
        color: #1976d2;
        border-left: 4px solid #1976d2;
      }

      #status.success {
        background: #e8f5e9;
        color: #388e3c;
        border-left: 4px solid #388e3c;
      }

      #status.error {
        background: #ffebee;
        color: #d32f2f;
        border-left: 4px solid #d32f2f;
      }

      #video {
        width: 100%;
        max-width: 640px;
        background: #000;
        border-radius: 10px;
        display: block;
        margin: 0 auto;
      }

      .info-box {
        background: #f5f5f5;
        padding: 15px;
        border-radius: 10px;
        margin-top: 20px;
        font-size: 14px;
        line-height: 1.6;
      }

      .info-box pre {
        background: white;
        padding: 10px;
        border-radius: 5px;
        overflow-x: auto;
        margin-top: 10px;
      }

      .badge {
        display: inline-block;
        background: #667eea;
        color: white;
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 12px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🎥 Test de Cámara</h1>
      <p class="subtitle">Herramienta de diagnóstico para LEE(PE)</p>

      <button id="start">🚀 Iniciar Cámara</button>
      <button
        id="stop"
        style="display: none; background: #e53e3e"
      >
        🛑 Detener
      </button>

      <div
        id="status"
        style="display: none"
      ></div>

      <video
        id="video"
        autoplay
        playsinline
        muted
      ></video>

      <div class="info-box">
        <strong>ℹ️ Información del Sistema:</strong>
        <pre id="system-info">Cargando...</pre>
      </div>

      <div class="info-box">
        <strong>📊 Logs:</strong>
        <pre
          id="logs"
          style="max-height: 200px; overflow-y: auto"
        ></pre>
      </div>
    </div>

    <script>
      const video = document.getElementById('video')
      const status = document.getElementById('status')
      const startBtn = document.getElementById('start')
      const stopBtn = document.getElementById('stop')
      const systemInfo = document.getElementById('system-info')
      const logsElement = document.getElementById('logs')

      let stream = null
      let logs = []

      function log(message, data = null) {
        const timestamp = new Date().toLocaleTimeString()
        const logMessage = `[${timestamp}] ${message}`
        console.log(logMessage, data || '')
        logs.push(logMessage + (data ? '\n' + JSON.stringify(data, null, 2) : ''))
        logsElement.textContent = logs.join('\n\n')
        logsElement.scrollTop = logsElement.scrollHeight
      }

      function showStatus(message, type) {
        status.textContent = message
        status.className = type
        status.style.display = 'block'
      }

      // System info
      systemInfo.textContent = `
URL: ${window.location.href}
Protocolo: ${window.location.protocol}
User Agent: ${navigator.userAgent}
Navegador soporta getUserMedia: ${!!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia)}
        `.trim()

      startBtn.onclick = async () => {
        try {
          logs = []
          log('Iniciando prueba de cámara...')
          showStatus('🔄 Solicitando acceso a la cámara...', 'info')

          // Verificar soporte
          if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            throw new Error('Tu navegador no soporta acceso a cámara (getUserMedia no disponible)')
          }

          log('getUserMedia disponible')

          // Solicitar permisos
          log('Solicitando permisos de cámara...')
          stream = await navigator.mediaDevices.getUserMedia({
            video: {
              facingMode: { ideal: 'environment' },
              width: { ideal: 1280 },
              height: { ideal: 720 },
            },
            audio: false,
          })

          log('✅ Permisos concedidos')

          const tracks = stream.getVideoTracks()
          log('Tracks de video obtenidos', {
            count: tracks.length,
            label: tracks[0]?.label,
            settings: tracks[0]?.getSettings(),
          })

          showStatus('✅ Cámara activada exitosamente', 'success')

          // Asignar stream al video
          log('Asignando stream al elemento video...')
          video.srcObject = stream

          // Esperar a que el video esté listo
          video.onloadedmetadata = () => {
            log('Video metadata cargada', {
              videoWidth: video.videoWidth,
              videoHeight: video.videoHeight,
              readyState: video.readyState,
            })

            if (video.videoWidth === 0 || video.videoHeight === 0) {
              showStatus('⚠️ Advertencia: Video sin dimensiones (width/height = 0)', 'error')
              log('ERROR: Video dimensions are 0')
            }
          }

          video.onplay = () => {
            log('Video playing', {
              videoWidth: video.videoWidth,
              videoHeight: video.videoHeight,
              paused: video.paused,
              muted: video.muted,
            })
          }

          startBtn.style.display = 'none'
          stopBtn.style.display = 'inline-block'
        } catch (err) {
          const errorInfo = {
            name: err.name,
            message: err.message,
            stack: err.stack,
          }

          log('❌ ERROR', errorInfo)
          showStatus('❌ Error: ' + err.message, 'error')

          // Mensajes específicos por tipo de error
          if (err.name === 'NotAllowedError') {
            showStatus('❌ Permiso denegado. Por favor permite el acceso a la cámara.', 'error')
          } else if (err.name === 'NotFoundError') {
            showStatus('❌ No se encontró cámara en este dispositivo.', 'error')
          } else if (err.name === 'NotReadableError') {
            showStatus('❌ La cámara está siendo usada por otra aplicación.', 'error')
          } else if (err.message.includes('https')) {
            showStatus('❌ Se requiere HTTPS. Accede por https:// o localhost', 'error')
          }

          console.error('Error completo:', err)
        }
      }

      stopBtn.onclick = () => {
        if (stream) {
          stream.getTracks().forEach((track) => {
            track.stop()
            log('Track detenido: ' + track.label)
          })
          video.srcObject = null
          stream = null
          showStatus('🛑 Cámara detenida', 'info')
          stopBtn.style.display = 'none'
          startBtn.style.display = 'inline-block'
        }
      }

      // Inicializar
      log('Página cargada')
      log('Listo para probar cámara')
    </script>
  </body>
</html>
